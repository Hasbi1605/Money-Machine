services:
  - type: web
    name: ai-writing-tools
    runtime: python
    region: singapore # closest to Indonesia
    plan: free
    buildCommand: pip install -r requirements-saas.txt
    startCommand: uvicorn saas_app.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # set manually in Render dashboard
      - key: SAAS_SECRET_KEY
        generateValue: true
      - key: MIDTRANS_SERVER_KEY
        sync: false # set manually in Render dashboard
      - key: MIDTRANS_CLIENT_KEY
        sync: false # set manually in Render dashboard
      - key: MIDTRANS_IS_PRODUCTION
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health

  - type: web
    name: cikalnews
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-news.txt
    startCommand: uvicorn news_app.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: SHOPEE_AFFILIATE_ID
        sync: false
      - key: ALFAGIFT_AFFILIATE_ID
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
