<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — CikalNews</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #3949ab 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        text-align: center;
        padding: 2rem;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.95rem;
        opacity: 0.8;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: white;
        color: #1a237e;
        border-radius: 0.5rem;
        font-weight: 600;
        text-decoration: none;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Anda Sedang Offline</h1>
      <p>Sepertinya koneksi internet Anda terputus. Periksa koneksi Anda dan coba lagi untuk membaca berita terbaru dari CikalNews.</p>
      <a
        href="/"
        class="btn"
        onclick="
          location.reload();
          return false;
        "
        >Coba Lagi</a
      >
    </div>
  </body>
</html>
