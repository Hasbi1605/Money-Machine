name: Content Pipeline - Blog & Social Auto Generate

on:
  schedule:
    # Blog: 6 AM and 6 PM UTC (1 PM and 1 AM WIB)
    - cron: "0 6,18 * * *"
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Which pipeline to run"
        required: true
        default: "both"
        type: choice
        options:
          - blog
          - social
          - both

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p output/articles output/social logs data

      - name: Setup credentials
        run: |
          mkdir -p filejson data
          echo '${{ secrets.GOOGLE_SA_JSON_CONTENT }}' > filejson/propane-fusion-441822-a5-5ad666121cae.json
          echo '${{ secrets.BLOGGER_TOKEN_JSON }}' > data/blogger_token.json

      - name: Initialize database
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "import asyncio; from shared.database import init_db; asyncio.run(init_db())"

      - name: Run blog pipeline
        if: ${{ github.event_name == 'schedule' || github.event.inputs.pipeline == 'blog' || github.event.inputs.pipeline == 'both' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: filejson/propane-fusion-441822-a5-5ad666121cae.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHOPEE_AFFILIATE_ID: ${{ secrets.SHOPEE_AFFILIATE_ID }}
          ALFAGIFT_AFFILIATE_ID: ${{ secrets.ALFAGIFT_AFFILIATE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CONTENT_LANGUAGES: "en,id"
          TIMEZONE: "Asia/Jakarta"
        run: python main.py --blog

      - name: Run social pipeline
        if: ${{ github.event.inputs.pipeline == 'social' || github.event.inputs.pipeline == 'both' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CONTENT_LANGUAGES: "en,id"
          TIMEZONE: "Asia/Jakarta"
        run: python main.py --social

      - name: Upload generated articles
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: articles-${{ github.run_number }}
          path: output/articles/
          retention-days: 30

      - name: Upload social content
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: social-${{ github.run_number }}
          path: output/social/
          retention-days: 30

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
